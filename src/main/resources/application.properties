spring.config.import=optional:file:.env.properties

spring.application.name=${APP_NAME:aedn}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate is disabled because flyway will manage schema
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.jackson.time-zone=${TIMEZONE:Asia/Jakarta}

spring.mvc.throw-exception-if-no-handler-found=true

spring.web.resources.add-mappings=false

jwt.secret=${JWT_SECRET_KEY:}
jwt.expiration=${JWT_EXPIRATION:5m}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:30d}

s3.enabled=${S3_ENABLED:false}
s3.endpoint=${S3_ENDPOINT:}
s3.endpoint.public=${S3_PUBLIC_ENDPOINT:}
s3.region=${S3_REGION:}
s3.access=${S3_ACCESS_KEY:}
s3.secret=${S3_SECRET_KEY:}

# logging
logging.level._org.springframework.web.servlet.HandlerMapping.Mappings=${LOG_LEVEL:INFO}

server.servlet.context-path=/v1
